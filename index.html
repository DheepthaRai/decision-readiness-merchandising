    <script>
      // Restore path encoded by 404.html redirect (GitHub Pages SPA fix).
      (function () {
        var p = window.location.search.match(/[?&]p=([^&]+)/);
        if (p) {
          var path = decodeURIComponent(p[1]);
          window.history.replaceState(null, null,
            window.location.pathname.split('/').slice(0, 2).join('/') + '/' + path
          );
        }
      })();
    </script>
