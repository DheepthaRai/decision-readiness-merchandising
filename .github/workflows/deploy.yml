name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed for gh-pages branch push

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 3. Run pipeline (eval split = faster, ~350K rows) ──────────────────
      - name: Run data pipeline
        run: python run_pipeline.py --split eval
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}   # optional; dataset is public

      # ── 4. Copy CSVs into frontend/public/data/ ───────────────────────────
      - name: Copy pipeline outputs to frontend
        run: |
          mkdir -p frontend/public/data
          cp outputs/*.csv frontend/public/data/

      # ── 5. Node setup ──────────────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # ── 6. Build Vite app ──────────────────────────────────────────────────
      - name: Build React app
        working-directory: frontend
        run: npm run build

      # ── 7. Add .nojekyll so GitHub Pages serves Vite assets correctly ──────
      - name: Add .nojekyll
        run: touch frontend/dist/.nojekyll

      # ── 8. Deploy to gh-pages branch ──────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          force_orphan: true
